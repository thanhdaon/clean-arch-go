openapi: "3.0.0"
info:
  version: 1.0.0
  title: Task Manager
servers:
  - url: /api

paths:
  /users:
    post:
      operationId: addUser
      summary: Create a new user
      requestBody:
        description: User creation payload containing role and user details
        required: true
        content:
          application/json:
             schema:
               $ref: "#/components/schemas/PostUser"
      responses:
        "201":
          description: User successfully created
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /tasks:
    get:
      operationId: getTasks
      summary: Retrieve all tasks
      responses:
        "200":
          description: Tasks retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createTask
      summary: Create a new task
      requestBody:
        description: Task creation payload containing title and creator
        required: true
        content:
          application/json:
             schema:
               $ref: "#/components/schemas/PostTask"
      responses:
        "201":
          description: Task successfully created
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /tasks/{taskId}/status:
    put:
      operationId: changeTaskStatus
      summary: Update task status
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: Task status update payload
        required: true
        content:
          application/json:
             schema:
               $ref: "#/components/schemas/PutTaskStatus"
      responses:
        "200":
          description: Task status successfully updated
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /tasks/{taskId}:
    patch:
      operationId: updateTaskTitle
      summary: Update task title
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: Task title update payload
        required: true
        content:
          application/json:
             schema:
               $ref: "#/components/schemas/PatchTaskTitle"
      responses:
        "200":
          description: Task title successfully updated
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteTask
      summary: Delete a task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task successfully deleted
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /tasks/{taskId}/assign/{assigneeId}:
    put:
      operationId: assignTask
      summary: Assign task to a user
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
        - name: assigneeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task successfully assigned to the specified user
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /tasks/{taskId}/assign:
    delete:
      operationId: unassignTask
      summary: Unassign task from current user
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task successfully unassigned from current user
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /tasks/{taskId}/reopen:
    put:
      operationId: reopenTask
      summary: Reopen a completed task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task successfully reopened
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /tasks/{taskId}/archive:
    put:
      operationId: archiveTask
      summary: Archive a task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task successfully archived
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
          example: 500
          description: Error code
        message:
          type: string
          description: Error message
    Task:
      type: object
      required:
        [uuid, title, status, createdBy, assignedTo, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          example: Mariusz Pudzianowski
        status:
          type: string
          example: todo
        createdBy:
          type: string
          format: uuid
        assignedTo:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PostUser:
      type: object
      required: [role]
      properties:
        role:
          type: string
          example: "employer"
    PutTaskStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: "todo"
    PatchTaskTitle:
      type: object
      required: [title]
      properties:
        title:
          type: string
          example: "Updated task title"
    PostTask:
      type: object
      required: [title, creator]
      properties:
        title:
          type: string
          example: "let's do leg day!"
        creator:
          type: string
          format: uuid
